<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TellTheDev Widget</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-white text-sm font-sans">

    <div id="tellthedev-widget-root">

        <form class="p-4 bg-white rounded-md shadow space-y-3">
            <div class="flex justify-between">
                <button type="button" class="inline-flex items-center justify-center rounded-full bg-blue-100 px-2.5 py-0.5 text-blue-700 dark:bg-blue-700 dark:text-blue-100" data-type="bug">🐞
                    Bug</button>
                <button type="button" class="inline-flex items-center justify-center rounded-full bg-blue-100 px-2.5 py-0.5 text-blue-700 dark:bg-blue-700 dark:text-blue-100" data-type="feature">💡
                    Feature</button>
                <button type="button" class="inline-flex items-center justify-center rounded-full bg-blue-100 px-2.5 py-0.5 text-blue-700 dark:bg-blue-700 dark:text-blue-100" data-type="general">💬
                    General</button>
            </div>

            <textarea class="w-full p-2 border rounded resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Describe the issue or idea..." rows="4" required></textarea>

            <input type="file" accept="image/*" class="block text-sm" />

            <button type="submit" class="w-full bg-black text-white py-2 rounded hover:bg-gray-900">
                Submit Feedback
            </button>
        </form>
    </div>


    <script src="widget.js"></script>
</body>

</html>
