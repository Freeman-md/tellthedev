<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TellTheDev Widget</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    button,
    textarea,
    input {
      font-family: inherit;
    }

    #tellthedev-widget-root {
      padding: 0;
      width: 100%;
    }

    form {
      padding: 16px;
    }
  </style>
</head>

<body class="bg-white text-sm text-gray-800">
  <div id="tellthedev-widget-root">
    <!-- Alert -->
    <div id="form-error-alert"
      class="hidden mb-3 rounded-md bg-red-50 border border-red-200 p-3 text-red-700 text-sm font-medium">
      <!-- Message will be injected here -->
    </div>

    <form class="space-y-4 bg-white rounded-lg">
      <!-- Type Selector -->
      <div>
          <label class="block text-sm font-medium text-gray-700 mb-3">What type of feedback are you sharing?</label>
        <div class="flex gap-2">
          <button type="button"
            class="flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium bg-blue-100 text-blue-700 hover:bg-blue-200 transition focus:ring-offset-2 focus:ring-blue-500 focus:ring-2 cursor-pointer"
            data-type="bug">🐞 Bug</button>
          <button type="button"
            class="flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium bg-blue-100 text-blue-700 hover:bg-blue-200 transition focus:ring-offset-2 focus:ring-blue-500 focus:ring-2 cursor-pointer"
            data-type="feature">💡 Feature</button>
          <button type="button"
            class="flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium bg-blue-100 text-blue-700 hover:bg-blue-200 transition focus:ring-offset-2 focus:ring-blue-500 focus:ring-2 cursor-pointer"
            data-type="general">💬 General</button>
        </div>
        <small class="text-red-500 text-sm" id="type-error"></small>
      </div>

      <!-- Message Textarea -->
      <div>
        <textarea rows="4"
          class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
          placeholder="Describe the issue or idea..."></textarea>
        <small class="text-red-500 text-sm" id="message-error"></small>
      </div>

      <!-- Screenshot Upload -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Attach a screenshot (optional)</label>
        <input type="file" accept="image/*"
          class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 " />

        <small class="text-red-500 text-sm" id="image-error"></small>
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition font-medium">
        Submit Feedback
      </button>
    </form>
  </div>

  <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
  <script type="module" src="widget.js"></script>
  <script>
    // Function to send height to parent
    function updateParentHeight() {
      const height = document.documentElement.offsetHeight;
      window.parent.postMessage({ type: 'tellthedev:resize', height }, '*');
    }

    // Update height on load
    window.addEventListener('load', updateParentHeight);

    // Update height when content changes
    const observer = new MutationObserver(updateParentHeight);
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true,
      characterData: true 
    });

    // Update height when window resizes
    window.addEventListener('resize', updateParentHeight);
  </script>
</body>

</html>
